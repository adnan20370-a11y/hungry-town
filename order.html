<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Place Your Order | Hungry Town</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #0a0a0a; color: #fff; font-family: 'Poppins', sans-serif; line-height: 1.6; overflow-x: hidden; }

        /* Navbar */
        .navbar { background: #000; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 1001; }
        .logo { font-family: 'Playfair Display', serif; font-size: 1.2rem; color: #fff; text-transform: uppercase; letter-spacing: 1px; text-decoration: none; }
        .logo span { color: #c5a059; }

        /* Hamburger Menu */
        .menu-toggle { display: block; cursor: pointer; color: #c5a059; font-size: 1.8rem; background: none; border: none; }
        .nav-links { position: fixed; top: 0; right: -100%; width: 75%; height: 100vh; background: #111; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 30px; transition: 0.4s ease; z-index: 1000; list-style: none; box-shadow: -5px 0 15px rgba(0,0,0,0.5); }
        .nav-links.active { right: 0; }
        .nav-links a { color: #fff; text-decoration: none; font-size: 1.2rem; text-transform: uppercase; }
        .close-menu { position: absolute; top: 20px; right: 20px; font-size: 2rem; color: #c5a059; cursor: pointer; }

        /* Form Styling */
        .order-content { padding: 60px 5% 50px; text-align: center; }
        .order-content h1 { font-family: 'Playfair Display', serif; font-size: 2.5rem; color: #c5a059; margin-bottom: 30px; }

        .order-form-container { background: #151515; padding: 30px; border-radius: 8px; border: 1px solid #222; max-width: 600px; margin: 0 auto; text-align: left; }
        .form-group { margin-bottom: 20px; }
        label { display: block; color: #c5a059; font-size: 0.85rem; margin-bottom: 8px; text-transform: uppercase; font-weight: 600; }
        input, textarea { width: 100%; padding: 12px; background: #0a0a0a; border: 1px solid #333; color: #fff; border-radius: 4px; outline: none; font-family: 'Poppins', sans-serif; }
        input:focus, textarea:focus { border-color: #c5a059; }

        .submit-btn { background: #c5a059; color: #000; padding: 15px; border: none; border-radius: 4px; font-weight: 700; cursor: pointer; text-transform: uppercase; width: 100%; transition: 0.3s; margin-top: 10px; }
        .submit-btn:hover { background: #e0b970; }
        .submit-btn:disabled { background: #555; cursor: not-allowed; }

        #successMsg { display: none; color: #c5a059; margin-top: 20px; font-weight: 600; text-align: center; }
    </style>
</head>
<body>

     <nav class="navbar">
        <a href="index.html" class="logo">HUNGRY <span>TOWN</span></a>
        <button class="menu-toggle" onclick="toggleMenu()">☰</button>
        <ul class="nav-links" id="navLinks">
            <span class="close-menu" onclick="toggleMenu()">×</span>
            <li><a href="index.html">Home</a></li>
            <li><a href="menu.html">Menu</a></li>
            <li><a href="offers.html" style="color: #c5a059;">Offers</a></li>
            <li><a href="order.html">Your Order</a></li>
            <li><a href="contact.html">Contact Us</a></li>
        </ul>
    </nav>

    <div class="order-content">
        <h1>Place Your Order</h1>
        <div class="order-form-container">
            <form id="orderForm">
                <div class="form-group">
    <label>Name</label>
    <input type="text" name="name" placeholder="Enter your full name" required>
</div>

<div class="form-group">
    <label>Mobile Number</label>
    <input type="tel" name="mobile" placeholder="Enter mobile number" required>
</div>

<div class="form-group">
    <label>Address</label>
    <input type="text" name="address" placeholder="Enter delivery address" required>
</div>

<div class="form-group">
    <label>Coupon Code (Optional)</label>
    <input type="text" name="cupon_code" placeholder="Enter code here if you have one">
</div>

<div class="form-group">
    <label>Order Details</label>
    <textarea name="order" rows="4" placeholder="Please order with item number (e.g., 1x No. 5, 2x No. 12)" required></textarea>
</div>

<div class="form-group">
    <label>Message</label>
    <textarea name="message" rows="3" placeholder="Any special instructions?"></textarea>
</div>

<button type="submit" class="submit-btn" id="submitBtn">Place Order</button>

            </form>
            <p id="successMsg">Order placed successfully! We will call you shortly.</p>
        </div>
    </div>

   <script>
        function toggleMenu() {
            const navLinks = document.getElementById('navLinks');
            navLinks.classList.toggle('active');
        }

        // --- NEW GOOGLE SHEETS SCRIPT ---
        const scriptURL = 'https://script.google.com/macros/s/AKfycbzVvAdKgM1_O8MbUgfvGmEJ_yXhcF_fbVI30UdOTpDnEmxcQ8gvOqFIjxrmFt8HAHdaUw/exec';
        const form = document.getElementById('orderForm');
        const submitBtn = document.getElementById('submitBtn');
        const successMsg = document.getElementById('successMsg');

        form.addEventListener('submit', e => {
            e.preventDefault();
            submitBtn.disabled = true;
            submitBtn.innerText = "Processing...";

            // This line automatically grabs ALL fields, including 'cupon_code'
            fetch(scriptURL, { method: 'POST', body: new FormData(form)})
                .then(response => {
                    successMsg.style.display = "block";
                    form.reset();
                    submitBtn.disabled = false;
                    submitBtn.innerText = "Place Order";
                    // Hide success message after 5 seconds
                    setTimeout(() => { successMsg.style.display = "none"; }, 5000);
                })
                .catch(error => {
                    console.error('Error!', error.message);
                    submitBtn.disabled = false;
                    submitBtn.innerText = "Error - Try Again";
                });
        });
    </script>

</body>
</html>
